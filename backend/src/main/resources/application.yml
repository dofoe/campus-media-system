spring:
  profiles:
    active: h2

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

jwt:
  secret: campus-media-system-jwt-secret-key-must-be-at-least-32-characters-long-for-security
  expiration: 86400000

logging:
  level:
    com.campus.media: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
