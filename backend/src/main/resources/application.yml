server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/campus_media
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: campus-media-system-jwt-secret-key-must-be-at-least-32-characters-long-for-security
  expiration: 86400000

logging:
  level:
    com.campus.media: DEBUG
    org.springframework.security: DEBUG
